name: Publish to npm

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get release version
        id: version
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # When triggered by workflow_run, head_branch is the tag name, e.g. v1.2.3
          TAG="$HEAD_BRANCH"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --dir dist

      - name: Build npm packages
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python npm/build_npm_packages.py \
            --version "$PACKAGE_VERSION" \
            --dist-dir dist \
            --out-dir dist/npm

      - name: Publish main package
        run: npm publish dist/npm/main --access public --provenance
