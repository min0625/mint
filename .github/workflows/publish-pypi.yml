name: Publish to PyPI

on:
  # Listen for goreleaser workflow completion
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  build-and-publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # For PyPI Trusted Publisher (OIDC)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Get the version tag from goreleaser output
      - name: Get release version
        id: version
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION="$HEAD_BRANCH"
          # head_branch is the tag name for tag events, e.g. v1.2.3
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      # Download platform-specific binary archives from GitHub Releases
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --repo ${{ github.repository }} --dir dist \
            --pattern "mint_*.tar.gz" --pattern "mint_*.zip"

      # Assemble wheels
      - name: Build platform wheels
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python python/build_wheels.py \
            --version "$VERSION" \
            --dist-dir dist \
            --out-dir dist/wheels

      # Upload to PyPI (using OIDC Trusted Publisher, no manual token management needed)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels/
