version: 2

project_name: mint

builds:
  - id: mint
    main: ./cmd/mint
    binary: mint
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none*
    name_template: >-
      {{- .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore(\(deps\))?:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
