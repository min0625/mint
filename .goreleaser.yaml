version: 2

project_name: mint

builds:
  - id: mint
    main: ./cmd/mint
    binary: mint
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - none*
    name_template: >-
      {{- .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore(\(deps\))?:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: mint-ai
    repository:
      owner: min0625
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/min0625/mint"
    description: "Minimalist AI translation CLI powered by LLMs"
    license: "Apache-2.0"
    url:
      verified: "github.com/min0625/mint"
    caveats: |
      Set your LLM provider before use:
        export MINT_PROVIDER=google-genai
        export MINT_API_KEY=your_api_key
      See https://github.com/min0625/mint for details.
    commit_msg_template: "Cask update for mint-ai version {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  draft: false
  prerelease: auto
